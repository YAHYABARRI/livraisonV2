server:
  port: 8080
  error:
    include-message: always

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/quickship?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: quickship
    password: quickship
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
  sql:
    init:
      mode: always

quickship:
  jwt:
    secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
    expiration-ms: 86400000 # 24 heures
  admin:
    email: ${APP_ADMIN_EMAIL:admin@afrideex.ma}
    password: ${APP_ADMIN_PASSWORD:Afrideex@2026}
    first-name: ${APP_ADMIN_FIRST_NAME:AFRIDEEX}
    last-name: ${APP_ADMIN_LAST_NAME:Admin}
    phone: ${APP_ADMIN_PHONE:0600000000}
