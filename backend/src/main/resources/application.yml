server:
  port: ${PORT:8080}
  error:
    include-message: always

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/quickship?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ${SPRING_DATASOURCE_USERNAME:quickship}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
  sql:
    init:
      mode: always

quickship:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: 86400000 # 24 heures
  admin:
    email: ${APP_ADMIN_EMAIL}
    password: ${APP_ADMIN_PASSWORD:}
    password-hash: ${APP_ADMIN_PASSWORD_HASH:}
    first-name: ${APP_ADMIN_FIRST_NAME:AFRIDEEX}
    last-name: ${APP_ADMIN_LAST_NAME:Admin}
    phone: ${APP_ADMIN_PHONE:0600000000}

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:}
